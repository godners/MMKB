name: 00. Git Info

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: write

jobs:
  git-info:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
        
      - name: run bash
        run: bash .github/scripts/auto-commit-info.bash
        shell: bash

      - name: verify git config
        run: git config --local --list
        shell: bash
        

        