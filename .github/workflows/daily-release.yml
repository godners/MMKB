name: Daily Release

on:
  schedule:
    - cron: '0 18 * * *'      # 北京时间每天凌晨 02:00 (UTC+8)
  workflow_dispatch:          # 支持手动测试

permissions:
  contents: write

jobs:
  call-generate-readmes:
    # 注意：这里 **不要写 runs-on**，直接使用 reusable workflow
    uses: ./.github/workflows/generate-readmes.yml

  create-release:
    runs-on: ubuntu-latest
    needs: call-generate-readmes          # 等待 Generate READMEs 完成后再创建 Release

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 生成今日 Release Tag
        id: tag
        run: |
          TODAY=$(date -u -d '8 hours' '+%Y.%m.%d')
          TAG="${TODAY}.auto"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      - name: 生成 GMT+8 时间戳
        id: generate_time
        run: |
          TIME=$(date -u -d '8 hours' '+%Y-%m-%d %H:%M:%S')
          echo "time=${TIME}" >> $GITHUB_OUTPUT

      - name: 如果 Release 已存在则删除
        run: |
          TAG=${{ steps.tag.outputs.tag }}
          echo "检查并删除已存在的 Release: ${TAG}"
          gh release delete "${TAG}" --yes --cleanup-tag 2>/dev/null || echo "Release 不存在或已删除"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 创建新的 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "${{ steps.tag.outputs.tag }}"
          body: |
            ## 本次更新

            - 调用 Generate READMEs workflow 生成并提交所有 README.md
            - 文件夹使用 Markdown 标题 + 链接
            - 文件使用无序列表，按名称排序
            - 根目录文件优先显示，子文件夹递归展开

            生成时间（GMT+8）：${{ steps.generate_time.outputs.time }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}