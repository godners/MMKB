name: "[WORKFLOW] Auto Readmes (Root)"
# .github/workflow/auto-readmes-root.yml

on:
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  auto-readmes:
    runs-on: ubuntu-latest

    steps:
      - name: "[STEP] Run Checkout Repository via Action"
        id: checkout
        uses: actions/checkout@main
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: "[STEP] Run Auto Dependencies via Action"
        id: auto-deps
        uses: ./.github/actions/auto-deps

      - name: "[STEP] Run Auto Readmes (Root) via Action"
        id: auto-readmes-root
        uses: ./.github/actions/auto-readmes-root

      - name: "[STEP] Run Git Commit via Action"
        id: git-commit-readmes-root
        uses: ./.github/actions/git-commit
        with:
          patterns: |
            README.md
          commit-prefix: "Auto Readmes (Root)"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
