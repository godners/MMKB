name: "[WORKFLOW] Auto Readmes (Root)"

on:
  workflow_dispatch:        # 手动触发
  workflow_call:            # 允许被其他 workflow 调用

permissions:
  contents: write

jobs:
  auto-readmes:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@main
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Auto Readmes (Root)
        uses: ./.github/actions/auto-readmes-root

      - name: Run Git Commit
        uses: ./.github/actions/git-commit
        with:
          patterns: |
            README.md
          commit-prefix: "Auto Readmes (Root)"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}