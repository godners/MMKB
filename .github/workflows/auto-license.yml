name: "[WORKFLOW] Auto License"
# .github/workflow/auto-license.yml

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  add-license:
    runs-on: ubuntu-latest

    steps:
      - name: "[STEP] Run Checkout Repository via Action"
        uses: actions/checkout@main
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}        
      
      - name: "[STEP] Run Auto Dependencies via Action"
        uses: ./.github/actions/auto-deps

      - name: "[STEP] Run Auto License via Action"
        uses: ./.github/actions/auto-license
        with: 
          patterns: |
            **/*.md
            !**/README.md
            !**/LICENSE.md
            !**/CONTENTS.md
            !VERSION.md
            !Markdown*.md
            !.github/**
            !.git/**
            !.vscode/**
      
      - name: "[STEP] Run Git Commit via Action"
        uses: ./.github/actions/git-commit
        with:
          patterns: |
            **/*.md
            *.md
          commit-prefix: "Auto License"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}