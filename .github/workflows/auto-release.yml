name: 90. Auto Release

description: 创建每日自动 Release

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      
      - name: 生成 Release 信息
        id: release_info
        run: bash .github/scripts/auto-release-info.bash

      - name: 检查最后一次 Release 后是否有新提交
        id: has_changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash .github/scripts/auto-release-check.bash

      - name: 如果 Release 已存在则删除
        if: steps.has_changes.outputs.has_changes == 'true'
        run: |
          TAG=${{ steps.release_info.outputs.tag }}
          echo "检查并删除已存在的 Release: ${TAG}"
          gh release delete "${TAG}" --yes --cleanup-tag 2>/dev/null || echo "Release 不存在或已删除"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 创建新的 GitHub Release
        if: steps.has_changes.outputs.has_changes == 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.release_info.outputs.tag }}
          name: "${{ steps.release_info.outputs.tag }}"
          body: |
            ## 生成时间（GMT+8）：${{ steps.release_info.outputs.time }}

            此 Release 为自动每日构建，仅因有新提交而触发。
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          