name: Generate Contents

description: 递归遍历所有目录，自动生成/更新 CONTENTS.md，并提交更改

on:
  workflow_dispatch:        # 手动触发
  workflow_call:            # 允许被其他 workflow 调用

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: 设置 Git 用户信息
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: 运行 Python 脚本生成所有 CONTENTS.md
        run: python .github/scripts/generate-contents.py

      - name: Commit 并 Push CONTENTS 更新
        run: |
          echo "=== 当前工作目录状态 ==="
          git status --porcelain | cat
          
          echo "=== 添加所有 CONTENTS.md 文件（包括新文件）==="
          git add "**/CONTENTS.md" "CONTENTS.md"
          
          echo "=== 检查是否有待提交的变更 ==="
          if git diff --cached --quiet; then
            echo "✅ 没有检测到任何变更，跳过提交。"
          else
            echo "🔄 检测到变更，正在提交..."
            COMMIT_TIME=$(date '+%F %T')
            git commit -m "chore: auto generate CONTENTS.md on ${COMMIT_TIME}"
            echo "🚀 正在推送..."
            git push
            echo "✅ CONTENTS.md 已成功提交并推送！"
          fi
