name: "[WORKFLOW] Auto Version"
# .github/workflow/auto-version.yml

on:
    workflow_dispatch:

permissions:
    contents: write

jobs:
  auto-version:
    runs-on: ubuntu-latest

    steps:
      - name: "[STEP] Run Checkout Repository via Action"
        id: checkout
        uses: actions/checkout@main
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: "[STEP] Run Auto Dependencies via Action"
        id: auto-deps
        uses: ./.github/actions/auto-deps

      - name: "[STEP] Run Auto Version via Action"
        id: auto-version
        uses: ./.github/actions/auto-version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          patterns: |
            **/**
            !.vscode/**
            !.git/**
            !.github/**
            !VERSION.md

      - name: "[STEP] Run Git Commit via Action"
        id: git-commit-version
        uses: ./.github/actions/git-commit
        with:
          patterns: VERSION.md
          commit-prefix: Auto Version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}