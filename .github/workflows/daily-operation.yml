name: "[WORKFLOW] Daily Operation"
# .github/workflow/daily-operation.yml

on:
  schedule:
    - cron: '30 16 * * *'
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  daily-operation:
    runs-on: ubuntu-latest
    
    steps:
      - name: "[STEP] Run Checkout Repository via Action"
        uses: actions/checkout@main
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: "[STEP] Run Auto Dependencies via Action"
        uses: ./.github/actions/auto-deps
      
      - name: "[STEP] Run Auto Contents via Action"
        uses: ./.github/actions/auto-contents

      - name: "[STEP] Run Auto Readmes via Action"
        uses: ./.github/actions/auto-readmes

      - name: "[STEP] Run Auto License via Action"
        uses: ./.github/actions/auto-license

      - name: "[STEP] Run Auto MDLint via Action"
        uses: ./.github/actions/auto-mdlint

      - name: "[STEP] Run Git Commit via Action (First)"
        uses: ./.github/actions/git-commit
        with:
          patterns: |
            **/*.md
            *.md
            !VERSION.md
          commit-prefix: "Daily Markdown Fix"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: "[STEP] Run Git Release via Action (First)"
        uses: ./.github/actions/git-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: "[STEP] Run Auto Version via Action"
        uses: ./.github/actions/auto-version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: "[STEP] Run Auto Readmes via Action (Root)"
        uses: ./.github/actions/auto-readmes-root

      - name: "[STEP] Run Git Commit via Action (Second)"
        uses: ./.github/actions/git-commit
        with:
          patterns: |
            README.md
            VERSION.md
          commit-prefix: "Daily Version Update"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: "[STEP] un Git Release via Action (Second)"
        uses: ./.github/actions/git-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
