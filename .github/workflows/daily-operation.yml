name: "[WORKFLOW] Daily Operation"

on:
  schedule:
    - cron: '30 16 * * *'
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  daily-operation:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@main
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Run Auto Dependencies via Action
        uses: ./.github/actions/auto-deps
      
      - name: Run Auto Contents
        uses: ./.github/actions/auto-contents

      - name: Run Auto Readmes
        uses: ./.github/actions/auto-readmes

      - name: Run Auto License
        uses: ./.github/actions/auto-license

      - name: Run Auto MDLint
        uses: ./.github/actions/auto-mdlint

      - name: Run Auto Commit - First Time
        uses: ./.github/actions/git-commit
        with:
          patterns: |
            **/*.md
            *.md
            !VERSION.md
          commit-prefix: "Daily Markdown Fix"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Auto Release - First Time
        uses: ./.github/actions/git-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Auto Version
        uses: ./.github/actions/auto-version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Auto Readmes (Root)
        uses: ./.github/actions/auto-readmes-root

      - name: Run Auto Commit - Second Time
        uses: ./.github/actions/git-commit
        with:
          patterns: |
            README.md
            VERSION.md
          commit-prefix: "Daily Markdown Fix"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Auto Release - Second Time
        uses: ./.github/actions/git-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
