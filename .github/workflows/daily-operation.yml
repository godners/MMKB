name: 99. Daily Operation

on:
  schedule:
    - cron: '0 18 * * *'      # 北京时间每天凌晨 02:00 (UTC+8)
  workflow_dispatch:          # 支持手动测试

permissions:
  contents: write

jobs:
  daily-operation:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Run Auto License
        run: python .github/scripts/auto-contents.py
      
      - name: Run Auto Readmes
        run: python .github/scripts/auto-readmes.py

      - name: Run Auto License
        run: python .github/scripts/auto-license.py

      - name: Run Auto Commit
        uses: ./.github/actions/auto-commit
        with:
          patterns: |
            **/*.md
            *.md
          commit-prefix: "Auto License"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  call-auto-release:
    uses: ./.github/workflows/auto-release.yml
    needs: daily-operation
