name: "[WORKFLOW] Auto MDLint"
# .github/workflow/auto-mdlint.yml

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  auto-mdlint:
    runs-on: ubuntu-latest

    steps:
      - name: "[STEP] Run Checkout Repository via Action"
        uses: actions/checkout@main
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: "[STEP] Run Auto MDLint via Action"
        uses: ./.github/actions/auto-mdlint
        with:
          patterns: |
            **/*.md
            *.md

      - name: "[STEP] Run Git Commit via Action"
        uses: ./.github/actions/git-commit
        with:
          patterns: |
            **/*.md
            *.md
          commit-prefix: "Auto MDLint"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

