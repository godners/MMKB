name: "[WORKFLOW] Auto Contents"

on:
  workflow_dispatch:        # 手动触发
  workflow_call:            # 允许被其他 workflow 调用

permissions:
  contents: write

jobs:
  auto-contents:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@main
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Auto Contents
        uses: ./.github/actions/auto-contents

      - name: Run Auto Commit
        uses: ./.github/actions/auto-commit
        with:
          patterns: |
            **/CONTENTS.md
            CONTENTS.md
          commit-prefix: "Auto Contents"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}