name: "[WORKFLOW] Auto Contents"
# .github/workflow/auto-contents.yml

on:
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  auto-contents:
    runs-on: ubuntu-latest

    steps:
      - name: "[STEP] Run Checkout Repository via Action"
        uses: actions/checkout@main
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: "[STEP] Run Auto Dependencies via Action"
        uses: ./.github/actions/auto-deps

      - name: "[STEP] Run Bot Glob via Action"
        id: glob
        uses: ./.github/actions/bot-patterns
        with:
          partterns: |
            **/*.md
            !README.md
            !LICENSE.md
            !VERSION.md
            !.github/**
            !.git/**
            !.vscode/**
          debug: true
        
      - name: "[STEP] Run Auto Contents via Action"
        uses: ./.github/actions/auto-contents
        with:
          FILES: ${{ steps.glob.outputs.files }}
        
      - name: "[STEP] Run Git Commit via Action"
        uses: ./.github/actions/git-commit
        with:
          patterns: |
            **/CONTENTS.md
            CONTENTS.md
          commit-prefix: "Auto Contents"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}