name: 01. Auto Contents

on:
  workflow_dispatch:        # 手动触发
  workflow_call:            # 允许被其他 workflow 调用

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 运行 Python 脚本生成所有 CONTENTS.md
        run: python .github/scripts/auto-contents.py

      - name: Run Auto Commit
        uses: ./.github/actions/auto-commit
        with:
          patterns: |
            **/CONTENTS.md
            CONTENTS.md
          commit-prefix: "Auto Contents"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}