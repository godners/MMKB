name: 02. Auto Readmes

description: 递归遍历所有目录，自动生成/更新 README.md，并提交更改

on:
  workflow_dispatch:        # 手动触发
  workflow_call:            # 允许被其他 workflow 调用

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 运行 Python 脚本生成所有 README.md
        run: python .github/scripts/auto-readmes.py

      - name: Run Auto Commit
        uses: ./.github/actions/auto-commit
        with:
          patterns: |
            **/README.md
            README.md
          commit-prefix: "Auto Readmes"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}