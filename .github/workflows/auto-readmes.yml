name: "[WORKFLOW] Auto Readmes"
# .github/workflow/auto-readmes.yml

on:
  workflow_dispatch:  

permissions:
  contents: write

jobs:
  auto-readmes:
    runs-on: ubuntu-latest

    steps:
      - name: "[STEP] Run Checkout Repository via Action"
        uses: actions/checkout@main
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: "[STEP] Run Auto Dependencies via Action"
        uses: ./.github/actions/auto-deps

      - name: "[STEP] Run Bot Patterns via Action"
        id: glob
        uses: ./.github/actions/bot-patterns
        with:
          patterns: |
            !**/CONTENTS.md
            !**/README.md
            !.github/**
            !.git/**
            !.vscode/**

      - name: "[STEP] Run Auto Readmes via Action"
        uses: ./.github/actions/auto-readmes
        with:
          FILES: ${{ steps.glob.outputs.files }}

      - name: "[STEP] Run Git Commit via Action"
        uses: ./.github/actions/git-commit
        with:
          patterns: |
            **/README.md
            README.md
          commit-prefix: "Auto Readmes"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}