name: "[WORKFLOW] Auto Readmes"

on:
  workflow_dispatch:        # 手动触发
  workflow_call:            # 允许被其他 workflow 调用

permissions:
  contents: write

jobs:
  auto-readmes:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@main
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Run Auto Dependencies via Action
        uses: ./.github/actions/auto-deps

      - name: Run Auto Readmes
        uses: ./.github/actions/auto-readmes

      - name: Run Git Commit
        uses: ./.github/actions/git-commit
        with:
          patterns: |
            **/README.md
            README.md
          commit-prefix: "Auto Readmes"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}