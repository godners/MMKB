name: Auto Generate READMEs + Daily Release

on:
  schedule:
    - cron: '0 18 * * *' # 北京时间每天凌晨 02:00
  workflow_dispatch: # 允许手动触发测试

permissions:
  contents: write # 需要 push 和创建 Release 的权限

jobs:
  update-readmes-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # 需要完整历史用于 commit

      - name: 设置 Git 用户
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: 运行 Python 脚本生成所有 README.md
        run: python .github/scripts/generate_readmes.py
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
      
      - name: Commit 并 Push README 更新
        run: |
          if git diff --quiet; then
            echo "没有文件变更，跳过commit。"
          else
            git add "**/README.md" "README.md"
            git commit -m "docs: auto update READMEs with relative links [skip ci]" || echo
            git push
          fi

      - name: 生成今日 Release Tag
        id: Tag
        run: |
          TODAY=$(date -u -d '8 hours' '+%Y.%m.%d')
          TAG="${TODAY}.auto"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "今日 Tag：${TAG}"

      - name: 生成 GMT+8 时间戳
        id: generate_time
        run: |
          TIME=$(date -u -d '8 hours' '+%Y-%m-%d %H:%M:%S')
          echo "time=${TIME}" >> $GITHUB_OUTPUT
          echo "生成时间：${TIME}"
      
      - name: 检查 Release 是否存在
        id: check_release
        run: |
          if gh release view ${{ steps.tag.outputs.tag }} &>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: 创建新的 GitHub Release
        if: steps.check_release.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "自动更新 ${{ steps.tag.outputs.tag }}"
          body: |
            ## 本次更新

            - 文件夹使用相对路径链接到对应目录的 `README.md`
            - 文件使用相对路径链接，链接文字不含扩展名
            - 不再单独列出 `README.md` 文件
            - 文件夹采用层级 Markdown 标题（#、##、###...）

            生成时间（GMT+8）：${{ steps.generate_time.outputs.time }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
