name: Auto Generate READMEs + Daily Release

on:
  schedule:
    - cron: '0 18 * * *'      # 北京时间每天凌晨 02:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readmes-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 设置 Git 用户信息
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: 运行 Python 脚本生成所有 README.md
        run: python .github/scripts/generate_readmes.py
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}

      - name: Commit 并 Push README 更新
        run: |
          if git diff --quiet; then
            echo "没有文件变更，跳过 commit。"
          else
            git add "**/README.md" "README.md"
            git commit -m "docs: auto update READMEs with hierarchy [skip ci]" || echo "Nothing to commit"
            git push
          fi

      - name: 生成今日 Release Tag
        id: tag
        run: |
          TODAY=$(date -u -d '8 hours' '+%Y.%m.%d')
          TAG="${TODAY}.auto"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "今日 Tag: ${TAG}"

      - name: 生成 GMT+8 时间戳
        id: generate_time
        run: |
          TIME=$(date -u -d '8 hours' '+%Y-%m-%d %H:%M:%S')
          echo "time=${TIME}" >> $GITHUB_OUTPUT

      - name: 如果 Release 已存在则删除它
        run: |
          TAG=${{ steps.tag.outputs.tag }}
          echo "检查并删除已存在的 Release: ${TAG}"
          gh release delete "${TAG}" --yes --cleanup-tag 2>/dev/null || echo "Release 不存在或已删除"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 创建新的 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}   # 已去掉“自动更新”
          body: |
            ## 本次更新

            - 文件夹使用 Markdown 标题 + 链接（指向对应 README.md）
            - 文件使用无序列表（-）
            - 链接均为相对路径
            - 已排除 README.md 和 LICENSE 文件

            生成时间（GMT+8）：${{ steps.generate_time.outputs.time }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}