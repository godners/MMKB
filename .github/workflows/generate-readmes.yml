name: Generate READMEs

description: 递归遍历所有目录，自动生成/更新 README.md，并提交更改

on:
  workflow_dispatch:        # 手动触发
  workflow_call:            # 允许被其他 workflow 调用

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 设置 Git 用户信息
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
      
      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip

      - name: 运行 Python 脚本生成所有 README.md
        run: python .github/scripts/generate_readmes.py

      - name: Commit 并 Push README 更新
        run: |
          if git diff --quiet; then
            echo "没有文件变更，跳过 commit。"
          else
            git add "**/README.md" "README.md"
            git commit -m "Auto Generate READMEs" || echo "Nothing to commit"
            git push
          fi