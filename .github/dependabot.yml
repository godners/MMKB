# Dependabot 配置 - 自动更新依赖
# 适用于：GitHub Actions 和 GitHub Workflow 中的 actions

version: 2
updates:
  # GitHub Actions 依赖更新（强烈推荐开启）
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"           # 每周检查一次
      time: "08:00"                # UTC 时间 08:00（北京时间 16:00）
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore"
      include: "scope"
