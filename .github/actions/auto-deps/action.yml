name: "[ACTION] Auto Dependencies"

description: '使用 Apt 安装 Bash 依赖，使用缓存安装 Python 依赖'

runs:
  using: composite
  steps:       
    - name: "[STEP] Install JQ" 
      uses: dcarbone/install-jq-action@main
    
    - name: "[STEP] Set Cache Module for Pip"
      uses: actions/cache@main
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('.github/actions/pip-dependencies/requirements.txt')}}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: "[STEP] Install Dependencies"
      shell: bash
      run: pip install -r ${{ github.action_path }}/requirements.txt

    - name: "[STEP] Print Summery"
      uses: ./.github/actions/bot-summary
      with:
        title: "Auto Dependencies"
        message: "Installed [BASH]jq, [PYTHON]json5."
