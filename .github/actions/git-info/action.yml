name: "[ACTION] Git Info"

description: Load Git Info

runs:
  using: composite
  steps:
    - name: "[STEP] Install Dependencies"
      uses: dcarbone/install-jq-action@main
      
    - name: "[STEP] Run Worker via Bash"
      run: bash ${{ github.action_path }}/worker.bash
      shell: bash
      env:
        ACTION_PATH: ${{ github.action_path }}