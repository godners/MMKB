name: "[ACTION] Git Release"

description: '根据最新提交自动创建 GitHub Release'

runs:
  using: 'composite'
  steps:
    - name: "[STEP] Run Worker (Info) via Bash"
      id: release_info
      shell: bash
      run: bash ${{ github.action_path }}/worker-info.bash
    
    - name: "[STEP] Run Worker (Check) via Bash"
      id: has_changes
      shell: bash
      run: bash ${{ github.action_path }}/worker-check.bash
      env:
        GITHUB_TOKEN: ${{ env.GITHUB_TOKEN }}

    - name: "[STEP] Remove Release If Exists"
      if: steps.has_changes.outputs.has_changes == 'true'
      shell: bash
      run: gh release delete ${{ steps.release_info.outputs.tag }} --yes --cleanup-tag 2>/dev/null || echo ""
      env:
        GH_TOKEN: ${{ env.GITHUB_TOKEN }}
    
    - name: "[STEP] Create New Release"
      if: steps.has_changes.outputs.has_changes == 'true'
      uses: softprops/action-gh-release@v3
      with:
        tag_name: ${{ steps.release_info.outputs.tag }}
        name: "${{ steps.release_info.outputs.tag }}"
        body: |
          ## 生成时间（GMT+8）：${{ steps.release_info.outputs.time }}

          此 Release 为自动每日构建，仅因有新提交而触发。
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ env.GITHUB_TOKEN }}
