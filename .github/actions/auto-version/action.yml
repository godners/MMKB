name: "[ACTION] Auto Version"
# .github/actions/auto-version/action.yml

description: '自动生成 VERSION.md 文件'

inputs:
  patterns:
    description: '要匹配的文件模式表达式（每行一个）'
    required: true

runs:
  using: composite
  steps:
    - name: "[STEP] Run Bot Patterns via Action"
      id: glob
      uses: ./.github/actions/bot-patterns
      with:
        patterns: ${{ inputs.patterns }}

    - name: "[STEP] Run Worker via Bash"
      id: worker-bash
      shell: bash
      run: bash ${{ github.action_path }}/worker.bash
      env:
        GITHUB_TOKEN: ${{ env.GITHUB_TOKEN }}

    - name: "[STEP] Run Worker via Python"
      id: worker-python
      shell: bash
      run: python ${{ github.action_path }}/worker.py
      env:
        ACTION_PATH: ${{ github.action_path }}
        FILES: ${{ steps.glob.outputs.files }}

    - name: "[STEP] Print Summary via Action (No Changed)"
      id: bot-summary-changed
      if: steps.worker-python.outputs.has_changes == 'false'
      uses: ./.github/actions/bot-summary
      with:
        title: "Auto Version"
        message: "No Changed"

    - name: "[STEP] Print Summary via Action (Has Changed)"
      id: bot-summary-nochange
      if: steps.worker-python.outputs.has_changes == 'true'
      uses: ./.github/actions/bot-summary
      with:
        title: "Auto Version"
        message: "Folder Count = ${{ steps.worker-python.outputs.folder_count }}, File Count = ${{ steps.worker.outputs.file_count }}, Total Size = ${{ steps.worker.outputs.size_hr }}"

