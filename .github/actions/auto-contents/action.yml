name: "[ACTION] Auto Contents"
# .github/actions/auto-contents/action.yml

description: '自动生成 CONTENTS.md 文件'

inputs:
  FILES:
    description: '要匹配的文件模式表达式（每行一个）'
    required: true

runs:
  using: composite
  steps:
    - name: "[STEP] Run Worker via Python"
      id: worker
      run: python ${{ github.action_path }}/worker.py
      shell: bash
      env:
        ACTION_PATH: ${{ github.action_path }}
        FILES: ${{ inputs.FILES }}        
    
    - name: "[STEP] Print Summary via Action"
      uses: ./.github/actions/bot-summary
      with:
        title: "Auto Contents"
        message: "Scanned ${{ env.TOTAL_FOLDERS }} Folders, Updated ${{ env.TOTAL_UPDATES }} Files." 