name: "[ACTION] Auto Contents"

description: '自动生成 CONTENTS.md 文件'

runs:
  using: composite
  steps:
    - name: Load Git Info
      shell: bash
      run: bash .github/scripts/auto-commit-info.bash

    - name: "[STEP] Run Worker via Python"
      run: python ${{ github.action_path }}/worker.py
      shell: bash
      env:
        ACTION_PATH: ${{ github.action_path }}