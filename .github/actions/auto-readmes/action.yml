name: "[ACTION] Auto Readmes"
# .github/actions/auto-readmes/action.yml

description: '自动生成 README.md 文件'

inputs:
  FILES:
    description: '要匹配的文件模式表达式（每行一个）'
    required: true

runs:
  using: composite
  steps:
    - name: "[STEP] Run Worker via Python"
      run: python ${{ github.action_path }}/worker.py
      shell: bash
      env:
        ACTION_PATH: ${{ github.action_path }}
        FILES: ${{ inputs.FILES }}

    - name: "[STEP] Print Summary via Action"
      uses: ./.github/actions/bot-summary
      with:
        title: "Auto Readmes"
        message: "Scanned ${{ env.TOTAL_FOLDERS }} Folders, Updated ${{ env.TOTAL_UPDATES }} Readme." 