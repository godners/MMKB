name: New Item Request / 新内容建议
description: 建议添加新药物、补充知识或改进现有内容
title: "[New Item] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢您提出建议！请填写以下信息，帮助我们更好地完善知识库。
        Thank you for your suggestion!

  - type: input
    id: topic
    attributes:
      label: 建议主题 / Topic
      description: 您想添加或改进的内容主题（例如：某种药物、某个机制）
      placeholder: 例如：曲安奈德 或 醛固酮拮抗剂机制
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 详细描述 / Description
      description: 请详细说明您希望添加或修改的内容
      placeholder: 我建议补充... / I suggest adding...
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: 理由 / Reason
      description: 为什么这个内容很重要？（可选）
      placeholder: 这个知识点对临床很有帮助...

  - type: textarea
    id: references
    attributes:
      label: 参考来源 / References (可选)
      description: 如果有可靠的参考文献或来源，请在此列出

  - type: checkboxes
    id: checklist
    attributes:
      label: 检查清单 / Checklist
      options:
        - label: 我确认这个建议符合 CC BY-NC-SA 许可协议
          required: true
        - label: 我已检查现有内容，避免重复添加
          required: true