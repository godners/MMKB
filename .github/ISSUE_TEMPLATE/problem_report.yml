name: Problem Report / 错误报告
description: 报告现有笔记中的错误、格式问题或链接失效
title: "[Problem] "
labels: ["Problem"]
body:
  - type: markdown
    attributes:
      value: |
        感谢您提交错误报告！请尽可能详细填写以下内容。
        Thank you for reporting a bug! Please fill in the details below.

  - type: input
    id: file_path
    attributes:
      label: 文件路径 / File Path
      description: 出现问题的文件路径（例如：激素作用/阿那曲唑.md）
      placeholder: 激素作用/阿那曲唑.md
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 问题描述 / Description
      description: 请详细描述问题是什么（事实错误、笔误、格式问题、链接失效等）
      placeholder: 请在这里详细描述问题...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 预期结果 / Expected Behavior
      description: 您期望这个部分应该是什么样的？
      placeholder: 我期望这里的内容是...

  - type: textarea
    id: screenshots
    attributes:
      label: 截图或额外信息 / Screenshots or Additional Information
      description: 如果有截图或其它有助于说明问题的信息，请粘贴在此处（可选）

  - type: checkboxes
    id: checklist
    attributes:
      label: 检查清单 / Checklist
      options:
        - label: 我已搜索过现有 Issue，确保这个问题尚未被报告
          required: true
        - label: 我确认这个问题与仓库内容相关，而非个人使用问题
          required: true